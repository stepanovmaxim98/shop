{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Регистрация</h3>
      </div>
      <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="username" class="form-label">Имя пользователя</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password2" class="form-label"
              >Подтверждение пароля</label
            >
            <input
              type="password"
              class="form-control"
              id="password2"
              name="password2"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary">
            Зарегистрироваться
          </button>
        </form>

        <p class="mt-3">
          Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
