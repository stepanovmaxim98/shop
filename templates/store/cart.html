{% extends 'base.html' %}

{% block content %}
    <h2>Ваша корзина</h2>
    <p>Количество товаров: {{ total_items }}</p>

    <table class="table">
        <tr>
            <th>Товар</th>
            <th>Количество</th>
            <th>Цена</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.total_price }}</td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
